<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>H4G Markdown Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #171b22;
      --panel-2: #202633;
      --text: #eef2f7;
      --muted: #a9b3c4;
      --line: #303847;
      --accent: #72d6a3;
      --accent-2: #79b8ff;
      --code: #10141b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.62 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 17, 21, 0.96);
      backdrop-filter: blur(10px);
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 12px 0;
    }

    .brand {
      display: flex;
      min-width: 0;
      flex-direction: column;
      gap: 2px;
    }

    .brand a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    #path {
      overflow: hidden;
      color: var(--muted);
      font-size: 0.9rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      flex: 0 0 auto;
      gap: 8px;
    }

    .actions a,
    .actions button {
      min-height: 36px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--accent-2);
      cursor: pointer;
      font: inherit;
      text-decoration: none;
    }

    .actions a:hover,
    .actions button:hover,
    .actions a:focus-visible,
    .actions button:focus-visible {
      border-color: var(--accent-2);
      outline: none;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 32px;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    article {
      min-width: 0;
    }

    aside {
      position: sticky;
      top: 76px;
      align-self: start;
      max-height: calc(100vh - 96px);
      overflow: auto;
      border-left: 1px solid var(--line);
      padding-left: 16px;
    }

    aside h2 {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    aside a {
      display: block;
      padding: 4px 0;
      color: var(--muted);
      font-size: 0.9rem;
      text-decoration: none;
    }

    aside a:hover,
    aside a:focus-visible {
      color: var(--accent-2);
      outline: none;
    }

    h1,
    h2,
    h3,
    h4 {
      line-height: 1.18;
      letter-spacing: 0;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 4vw, 3.2rem);
    }

    h2 {
      margin-top: 38px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 1.55rem;
    }

    h3 {
      margin-top: 28px;
      font-size: 1.2rem;
    }

    h4 {
      margin-top: 22px;
      font-size: 1rem;
    }

    p,
    li {
      color: var(--text);
    }

    a {
      color: var(--accent-2);
    }

    blockquote {
      margin: 18px 0;
      padding: 12px 14px;
      border-left: 3px solid var(--accent);
      background: var(--panel);
      color: var(--muted);
    }

    code {
      border-radius: 4px;
      background: var(--code);
      color: #d8e5ff;
      font: 0.92em ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    :not(pre) > code {
      padding: 2px 5px;
    }

    pre {
      overflow: auto;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--code);
    }

    pre code {
      padding: 0;
      background: transparent;
    }

    table {
      display: block;
      width: 100%;
      overflow: auto;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 9px 10px;
      border: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      background: var(--panel-2);
      text-align: left;
    }

    tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.025);
    }

    .status {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
    }

    /* Checkbox Styling */
    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--line);
      border-radius: 4px;
      background: var(--code);
      cursor: not-allowed;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      vertical-align: middle;
      margin-right: 8px;
      transition: all 0.2s ease;
    }

    input[type="checkbox"]:checked {
      border-color: var(--accent);
      background: rgba(92, 242, 169, 0.1);
    }

    input[type="checkbox"]:checked::after {
      content: '✓';
      color: var(--accent);
      font-size: 13px;
      font-weight: bold;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @media (max-width: 860px) {
      .bar {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        display: block;
      }

      aside {
        position: static;
        max-height: none;
        margin-top: 32px;
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 18px 0 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand">
        <a href="index.html">H4G Training Vault</a>
        <span id="path">Loading...</span>
      </div>
      <nav class="actions" aria-label="Viewer actions">
        <a id="raw-link" href="#">Raw Markdown</a>
        <button id="copy-link" type="button">Copy Link</button>
      </nav>
    </div>
  </header>

  <main>
    <article id="content" class="status">Loading Markdown...</article>
    <aside aria-label="Table of contents">
      <h2>On This Page</h2>
      <nav id="toc"></nav>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const requestedFile = params.get("file") || "H4G Training.md";
    const content = document.getElementById("content");
    const pathLabel = document.getElementById("path");
    const rawLink = document.getElementById("raw-link");
    const copyLink = document.getElementById("copy-link");
    const toc = document.getElementById("toc");

    function normalizePath(path) {
      const parts = [];
      decodeURIComponent(path).replace(/\\/g, "/").split("/").forEach((part) => {
        if (!part || part === ".") return;
        if (part === "..") {
          parts.pop();
          return;
        }
        parts.push(part);
      });
      return parts.join("/");
    }

    function dirname(path) {
      const index = path.lastIndexOf("/");
      return index === -1 ? "" : path.slice(0, index);
    }

    function isExternal(href) {
      return /^(?:[a-z][a-z0-9+.-]*:|#)/i.test(href);
    }

    function slugify(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/<[^>]*>/g, "")
        .replace(/[^\w\s-]/g, "")
        .replace(/\s/g, "-");
    }

    function renderToc() {
      toc.replaceChildren();
      const headings = content.querySelectorAll("h1, h2, h3");
      const seen = new Map();

      headings.forEach((heading) => {
        const base = slugify(heading.textContent || "section") || "section";
        const count = seen.get(base) || 0;
        seen.set(base, count + 1);
        heading.id = count ? `${base}-${count}` : base;

        const link = document.createElement("a");
        link.href = `#${heading.id}`;
        link.textContent = heading.textContent;
        link.style.paddingLeft = heading.tagName === "H3" ? "12px" : "0";
        toc.appendChild(link);
      });
    }

    function rewriteMarkdownLinks(filePath) {
      const baseDir = dirname(filePath);
      content.querySelectorAll("a[href]").forEach((anchor) => {
        const original = anchor.getAttribute("href");
        if (!original || isExternal(original)) return;

        const [linkPath, hash] = original.split("#");
        if (!linkPath.toLowerCase().endsWith(".md")) return;

        const nextPath = normalizePath(`${baseDir}/${linkPath}`);
        anchor.href = `viewer.html?file=${encodeURIComponent(nextPath)}${hash ? `#${hash}` : ""}`;
      });
    }

    async function loadMarkdown() {
      const filePath = normalizePath(requestedFile);
      pathLabel.textContent = filePath;
      rawLink.href = encodeURI(filePath);

      try {
        const response = await fetch(encodeURI(filePath), { cache: "no-cache" });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        const markdown = await response.text();
        const html = marked.parse(markdown, { gfm: true, breaks: false });
        content.className = "";
        content.innerHTML = DOMPurify.sanitize(html);
        rewriteMarkdownLinks(filePath);
        renderToc();
      } catch (error) {
        content.className = "status";
        content.textContent = `Could not load ${filePath}: ${error.message}`;
      }
    }

    copyLink.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(window.location.href);
        copyLink.textContent = "Copied";
        setTimeout(() => {
          copyLink.textContent = "Copy Link";
        }, 1200);
      } catch {
        copyLink.textContent = "Copy Failed";
        setTimeout(() => {
          copyLink.textContent = "Copy Link";
        }, 1200);
      }
    });

    loadMarkdown();
  </script>
</body>
</html>
