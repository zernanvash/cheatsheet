name: Sync Vault To Notion

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "H4G Training.md"
      - "RedTeam Machine.md"
      - "guides/**/*.md"
      - "tools/**/*.md"
      - "references/**/*.md"
      - "notion-sync-manifest.txt"
      - "scripts/sync_notion.py"
      - ".github/workflows/sync-notion.yml"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Notion secrets
        id: notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: |
          if [ -n "$NOTION_TOKEN" ] && [ -n "$NOTION_PARENT_PAGE_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Notion secrets are not configured; skipping sync."
          fi

      - name: Sync Markdown pages to Notion
        if: steps.notion.outputs.configured == 'true'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_TITLE_PREFIX: ${{ vars.NOTION_TITLE_PREFIX }}
        run: python scripts/sync_notion.py
